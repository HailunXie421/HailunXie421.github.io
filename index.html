<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Xie Hailun</title>
  <meta name="description" content="Xie Hailun's academic profile, publications, translations, and projects." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="top" class="site-shell">
    <aside class="sidebar" aria-label="Profile information">
      <figure class="portrait-frame">
        <img src="assets/avatar-climbing.jpg" alt="Xie Hailun climbing" />
      </figure>

      <div class="identity">
        <h1 data-hero-name>Xie Hailun</h1>
      </div>

      <div class="info-list" data-info-list></div>
    </aside>

    <div class="content-flow">
      <nav class="top-nav" aria-label="Page navigation">
        <a href="#about">About</a>
        <a href="#publications">Publications</a>
        <a href="#translations">Translations</a>
        <a href="#projects">Projects</a>
      </nav>

      <section class="section" id="about">
        <article class="prose" data-profile></article>
      </section>

      <section class="section" id="publications">
        <div class="section-heading">
          <h2>Publications</h2>
        </div>
        <div class="compact-list" data-publications></div>
      </section>

      <section class="section" id="translations">
        <div class="section-heading">
          <h2>Translations</h2>
        </div>
        <div class="compact-list" data-translations></div>
      </section>

      <section class="section" id="projects">
        <div class="section-heading">
          <h2>Projects</h2>
        </div>

        <article class="project-entry featured-project">
          <div class="project-main">
            <h3 data-project-title>Wright</h3>
            <p data-project-summary></p>
            <p class="project-links" data-project-links></p>
          </div>
          <div class="project-media" data-project-media>
            <p>Project preview will appear here when available.</p>
          </div>
        </article>
      </section>

      <footer class="footer">
        <span>Last updated: <time data-last-updated>2026-06-09</time></span>
      </footer>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
